<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking — EcoScore</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .podium { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 1rem; max-width: 600px; margin: 0 auto 2.5rem; align-items: end; }
    .podium-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1rem; text-align: center; transition: var(--transition); }
    .podium-card:hover { transform: translateY(-3px); }
    .podium-1 { background: linear-gradient(180deg, rgba(255,193,7,0.12) 0%, var(--surface) 100%); border-color: rgba(255,193,7,0.4); }
    .podium-2 { background: linear-gradient(180deg, rgba(158,158,158,0.1) 0%, var(--surface) 100%); border-color: rgba(158,158,158,0.3); }
    .podium-3 { background: linear-gradient(180deg, rgba(141,110,99,0.1) 0%, var(--surface) 100%); border-color: rgba(141,110,99,0.3); }
    .podium-medal { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    .podium-name { font-weight: 800; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .podium-sub { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.75rem; }
    .podium-pts { font-size: 1.4rem; font-weight: 900; }
    .podium-1 .podium-pts { color: var(--gold); }
    .podium-2 .podium-pts { color: var(--silver); }
    .podium-3 .podium-pts { color: var(--bronze); }
    .rank-list { display: flex; flex-direction: column; gap: 0.6rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <span class="logo-icon">🌿</span>
    <div>
      <span class="logo-text">EcoScore</span>
      <span class="logo-sub">Gestão Sustentável de Resíduos</span>
    </div>
  </a>
  <ul class="navbar-nav">
    <li><a href="dashboard.html" id="navDash" style="display:none">Painel</a></li>
    <li><a href="ranking.html" class="active">Ranking</a></li>
    <li><a href="recompensas.html">Recompensas</a></li>
  </ul>
  <div class="navbar-actions" id="navActions">
    <a href="login.html" class="btn btn-primary btn-sm">🔑 Login</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div>
      <h1 class="page-title">🏆 Ranking EcoScore</h1>
      <p class="page-desc">Competição saudável pelo descarte sustentável</p>
    </div>
    <button onclick="carregarDados()" class="btn btn-secondary btn-sm">🔄 Atualizar</button>
  </div>
</div>

<main class="section">
  <div class="container">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-funcionarios" onclick="setTab('funcionarios')">👤 Funcionários</button>
      <button class="tab-btn" id="tab-setores" onclick="setTab('setores')">🏢 Por Setor</button>
    </div>

    <!-- Tab: Funcionários -->
    <div class="tab-content active" id="content-funcionarios">
      <!-- Pódio Top 3 -->
      <div class="podium" id="podium">
        <div class="podium-card podium-2"><span class="podium-medal">🥈</span><div class="podium-name">—</div><div class="podium-sub">—</div><div class="podium-pts">0 pts</div></div>
        <div class="podium-card podium-1"><span class="podium-medal">🥇</span><div class="podium-name">—</div><div class="podium-sub">—</div><div class="podium-pts">0 pts</div></div>
        <div class="podium-card podium-3"><span class="podium-medal">🥉</span><div class="podium-name">—</div><div class="podium-sub">—</div><div class="podium-pts">0 pts</div></div>
      </div>

      <!-- Lista completa -->
      <div class="rank-list" id="rankFuncionarios">
        <div class="empty-state"><span class="empty-icon">⏳</span><p>Carregando ranking...</p></div>
      </div>
    </div>

    <!-- Tab: Setores -->
    <div class="tab-content" id="content-setores">
      <div class="rank-list" id="rankSetores">
        <div class="empty-state"><span class="empty-icon">⏳</span><p>Carregando ranking...</p></div>
      </div>
    </div>

  </div>
</main>

<script src="/js/config.js"></script>
<script>
  let dadosFuncionarios = [];
  let dadosSetores = [];

  function setTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('content-' + tab).classList.add('active');
  }

  function renderPodium(dados) {
    if (dados.length === 0) return;
    const podium = document.getElementById('podium');
    const ordem = [dados[1], dados[0], dados[2]]; // 2º, 1º, 3º
    const cards = podium.querySelectorAll('.podium-card');
    ordem.forEach((d, i) => {
      if (!d) { cards[i].style.opacity = '0.3'; return; }
      cards[i].querySelector('.podium-name').textContent = d.funcionario_nome;
      cards[i].querySelector('.podium-sub').textContent = d.setor_nome;
      cards[i].querySelector('.podium-pts').textContent = d.total_pontos.toLocaleString() + ' pts';
    });
  }

  function renderFuncionarios(dados) {
    const container = document.getElementById('rankFuncionarios');
    if (dados.length === 0) {
      container.innerHTML = '<div class="empty-state"><span class="empty-icon">🌱</span><p>Nenhuma coleta registrada ainda. Seja o primeiro!</p></div>';
      return;
    }
    container.innerHTML = dados.slice(3).map((d, i) => `
      <div class="rank-item">
        <div class="rank-num rank-${i + 4}">#${i + 4}</div>
        <div class="rank-info">
          <div class="rank-name">${d.funcionario_nome}</div>
          <div class="rank-sub">🏢 ${d.setor_nome} · ♻️ ${d.total_kg.toFixed(1)}kg · ${d.total_registros} registros</div>
        </div>
        <div class="rank-pts">${d.total_pontos.toLocaleString()} <span style="font-size:0.7rem;color:var(--text-dim);font-weight:400">pts</span></div>
      </div>
    `).join('');
  }

  function renderSetores(dados) {
    const container = document.getElementById('rankSetores');
    if (dados.length === 0) {
      container.innerHTML = '<div class="empty-state"><span class="empty-icon">🌱</span><p>Nenhuma coleta registrada ainda.</p></div>';
      return;
    }
    const icons = { 0: '🥇', 1: '🥈', 2: '🥉' };
    container.innerHTML = dados.map((d, i) => `
      <div class="rank-item ${i < 3 ? 'rank-' + (i + 1) : ''}">
        <div class="rank-num">${icons[i] || '#' + (i + 1)}</div>
        <div class="rank-info">
          <div class="rank-name">${d.nome}</div>
          <div class="rank-sub">⚖️ ${d.total_kg.toFixed(1)}kg total · 📦 ${d.total_registros} registros</div>
        </div>
        <div class="rank-pts">${d.total_pontos.toLocaleString()} <span style="font-size:0.7rem;color:var(--text-dim);font-weight:400">pts</span></div>
      </div>
    `).join('');
  }

  async function carregarDados() {
    try {
      [dadosFuncionarios, dadosSetores] = await Promise.all([
        apiFetch('/api/ranking/funcionarios'),
        apiFetch('/api/ranking/setores')
      ]);
      renderPodium(dadosFuncionarios);
      renderFuncionarios(dadosFuncionarios);
      renderSetores(dadosSetores);
    } catch {
      document.getElementById('rankFuncionarios').innerHTML = '<div class="empty-state"><span class="empty-icon">❌</span><p>Erro ao carregar ranking</p></div>';
    }
  }

  // Verificar sessão para ajustar navbar
  apiFetch('/api/me').then(data => {
    if (data.logado) {
      document.getElementById('navDash').style.display = '';
      const actions = document.getElementById('navActions');
      if (data.tipo === 'setor') {
        actions.innerHTML = `<a href="registro.html" class="btn btn-primary btn-sm">📝 Registrar</a><button onclick="apiFetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login.html')" class="btn btn-secondary btn-sm">Sair</button>`;
      } else {
        actions.innerHTML = `<a href="admin.html" class="btn btn-secondary btn-sm">⚙️ Admin</a><button onclick="apiFetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login.html')" class="btn btn-secondary btn-sm">Sair</button>`;
      }
    }
  });

  carregarDados();
</script>
</body>
</html>
