<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Coleta — EcoScore</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .pontos-preview {
      background: linear-gradient(135deg, var(--dark-3), var(--green-900));
      border: 1px solid var(--green-700);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }
    .pontos-value { font-size: 3rem; font-weight: 900; color: var(--gold); line-height: 1; }
    .pontos-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.4rem; }
    
    /* Buscador de Funcionários */
    .search-wrapper { position: relative; margin-bottom: 1rem; }
    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 240px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: var(--shadow-lg);
      display: none;
    }
    .search-results.active { display: block; }
    .search-item {
      padding: 0.75rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: rgba(76, 175, 80, 0.1); }
    .search-item .name { display: block; font-weight: 700; color: var(--text); }
    .search-item .meta { display: block; font-size: 0.75rem; color: var(--text-dim); }
    
    .selected-func {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: rgba(76, 175, 80, 0.08);
      border: 1.5px solid var(--green-500);
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    .selected-func .icon { font-size: 1.5rem; }
    .selected-func .info { flex: 1; }
    .selected-func .remove { cursor: pointer; color: var(--text-dim); font-size: 1.2rem; }

    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
    .success-icon-anim { font-size: 5rem; animation: bounceIn 0.5s ease; }
    @keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .form-wrap { max-width: 560px; margin: 0 auto; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <span class="logo-icon">🌿</span>
    <div>
      <span class="logo-text">EcoScore</span>
      <span class="logo-sub">Gestão Sustentável de Resíduos</span>
    </div>
  </a>
  <ul class="navbar-nav">
    <li><a href="dashboard.html">Painel</a></li>
    <li><a href="registro.html" class="active">Registrar</a></li>
    <li><a href="ranking.html">Ranking</a></li>
    <li><a href="recompensas.html">Recompensas</a></li>
  </ul>
  <div class="navbar-actions">
    <button onclick="logout()" class="btn btn-secondary btn-sm">Sair</button>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div>
      <h1 class="page-title">📝 Registrar Coleta</h1>
      <p class="page-desc" id="headerDesc">Selecione o funcionário e os dados do material</p>
    </div>
    <div id="statusDia"></div>
  </div>
</div>

<!-- Overlay de Sucesso -->
<div class="success-overlay" id="successOverlay">
  <div>
    <div class="success-icon-anim">✅</div>
    <h2 style="font-size:1.8rem;font-weight:900;margin:1rem 0 0.5rem">Coleta Registrada!</h2>
    <p id="successMsg" style="color:var(--text-muted);font-size:1rem;margin-bottom:2rem"></p>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center">
      <button onclick="novaColeta()" class="btn btn-primary btn-lg">+ Nova Coleta</button>
      <a href="dashboard.html" class="btn btn-secondary btn-lg">Ver Painel</a>
    </div>
  </div>
</div>

<main class="section">
  <div class="container">
    <div class="form-wrap">

      <div id="alertBox" style="display:none;margin-bottom:1rem"></div>

      <!-- Preview de pontos -->
      <div class="pontos-preview" id="pontosPreview">
        <div class="pontos-value" id="pontosVal">0</div>
        <div class="pontos-label">pontos a ganhar neste registro</div>
      </div>

      <div class="card">
        <form id="formColeta" onsubmit="registrar(event)">

          <div class="form-group">
            <label class="form-label">👤 Selecionar Funcionário</label>
            
            <!-- Campo de Selecionado -->
            <div id="areaSelecionado" style="display:none">
              <div class="selected-func">
                <span class="icon">👤</span>
                <div class="info">
                  <span class="name" id="nomeSelecionado"></span>
                  <span class="meta" id="setorSelecionado" style="font-size:0.75rem;color:var(--text-dim)"></span>
                </div>
                <span class="remove" onclick="removerSelecao()">✕</span>
              </div>
            </div>

            <!-- Campo de Busca -->
            <div class="search-wrapper" id="areaBusca">
              <input id="inputBusca" class="form-control" type="text" placeholder="Digite o nome para pesquisar..." autocomplete="off">
              <div id="listaResultados" class="search-results"></div>
            </div>
            
            <input type="hidden" id="funcionarioNome" required>
          </div>

          <div class="form-group">
            <label class="form-label">♻️ Tipo de Material</label>
            <div class="material-grid">
              <label class="material-card" id="card-metal" onclick="selectMaterial('metal')">
                <input type="radio" name="material" value="metal">
                <span class="material-emoji">🔩</span>
                <div class="material-name">Metal</div>
                <div class="material-pts">10 pts/kg</div>
              </label>
              <label class="material-card" id="card-vidro" onclick="selectMaterial('vidro')">
                <input type="radio" name="material" value="vidro">
                <span class="material-emoji">🪟</span>
                <div class="material-name">Vidro</div>
                <div class="material-pts">7 pts/kg</div>
              </label>
              <label class="material-card" id="card-plastico" onclick="selectMaterial('plastico')">
                <input type="radio" name="material" value="plastico">
                <span class="material-emoji">🧴</span>
                <div class="material-name">Plástico</div>
                <div class="material-pts">5 pts/kg</div>
              </label>
              <label class="material-card" id="card-papel" onclick="selectMaterial('papel')">
                <input type="radio" name="material" value="papel">
                <span class="material-emoji">📄</span>
                <div class="material-name">Papel</div>
                <div class="material-pts">3 pts/kg</div>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="pesoKg">⚖️ Peso (kg)</label>
            <input id="pesoKg" class="form-control" type="number" step="0.1" min="0.1" max="999" placeholder="Ex: 2.5" required oninput="atualizarPreview()">
          </div>

          <div style="background:var(--dark-2);border-radius:var(--radius);padding:1rem;margin-bottom:1.5rem;font-size:0.83rem;color:var(--text-dim)">
            🗓️ Data registrada automaticamente: <strong id="dataHoje" style="color:var(--text-muted)"></strong>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="btnRegistrar">✅ Registrar Coleta</button>
        </form>
      </div>
    </div>
  </div>
</main>

<script src="/js/config.js"></script>
<script>
  const PONTOS = { metal: 10, vidro: 7, plastico: 5, papel: 3 };
  let materialSelecionado = null;
  let todosFuncionarios = [];
  let funcionarioSelecionado = null;

  function selectMaterial(material) {
    document.querySelectorAll('.material-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('card-' + material).classList.add('selected');
    materialSelecionado = material;
    atualizarPreview();
  }

  function atualizarPreview() {
    const peso = parseFloat(document.getElementById('pesoKg').value) || 0;
    const pts = materialSelecionado ? Math.round(peso * PONTOS[materialSelecionado]) : 0;
    document.getElementById('pontosVal').textContent = pts.toLocaleString();
  }

  function showAlert(msg, tipo = 'error') {
    const box = document.getElementById('alertBox');
    const cls = { error: 'alert-error', warning: 'alert-warning', success: 'alert-success', info: 'alert-info' };
    const icon = { error: '❌', warning: '⚠️', success: '✅', info: 'ℹ️' };
    box.innerHTML = `<div class="alert ${cls[tipo]}">${icon[tipo]} ${msg}</div>`;
    box.style.display = '';
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Lógica de Busca de Funcionários
  const inputBusca = document.getElementById('inputBusca');
  const listaResultados = document.getElementById('listaResultados');

  inputBusca.oninput = () => {
    const termo = inputBusca.value.toLowerCase().trim();
    if (termo.length < 1) {
      listaResultados.classList.remove('active');
      return;
    }

    const filtrados = todosFuncionarios.filter(f => 
      f.nome.toLowerCase().includes(termo) || 
      f.setor.toLowerCase().includes(termo)
    );

    if (filtrados.length > 0) {
      listaResultados.innerHTML = filtrados.map(f => `
        <div class="search-item" onclick="selecionarFuncionario('${f.id}')">
          <span class="name">${f.nome}</span>
          <span class="meta">${f.setor}</span>
        </div>
      `).join('');
      listaResultados.classList.add('active');
    } else {
      listaResultados.innerHTML = '<div class="search-item text-dim">Nenhum funcionário encontrado</div>';
      listaResultados.classList.add('active');
    }
  };

  function selecionarFuncionario(id) {
    const f = todosFuncionarios.find(x => x.id === id);
    if (!f) return;

    funcionarioSelecionado = f;
    document.getElementById('funcionarioNome').value = f.nome;
    document.getElementById('nomeSelecionado').textContent = f.nome;
    document.getElementById('setorSelecionado').textContent = f.setor;
    
    document.getElementById('areaBusca').style.display = 'none';
    document.getElementById('areaSelecionado').style.display = 'block';
    listaResultados.classList.remove('active');
    inputBusca.value = '';
  }

  function removerSelecao() {
    funcionarioSelecionado = null;
    document.getElementById('funcionarioNome').value = '';
    document.getElementById('areaBusca').style.display = 'block';
    document.getElementById('areaSelecionado').style.display = 'none';
    inputBusca.focus();
  }

  async function registrar(e) {
    e.preventDefault();

    const funcionario_nome = document.getElementById('funcionarioNome').value;
    const peso_kg = document.getElementById('pesoKg').value;

    if (!funcionarioSelecionado) { showAlert('Selecione um funcionário da lista.', 'warning'); return; }
    if (!materialSelecionado) { showAlert('Selecione o tipo de material.', 'warning'); return; }

    const btn = document.getElementById('btnRegistrar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Registrando...';
    document.getElementById('alertBox').style.display = 'none';

    try {
      const data = await apiFetch('/api/coletas', {
        method: 'POST',
        body: { funcionario_nome, tipo_material: materialSelecionado, peso_kg }
      });
      document.getElementById('successMsg').textContent = `+${data.pontos} pontos para ${funcionario_nome}!`;
      document.getElementById('successOverlay').classList.add('show');
    } catch (err) {
      showAlert(err.message || 'Erro ao registrar coleta.', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = '✅ Registrar Coleta';
  }

  function novaColeta() {
    document.getElementById('successOverlay').classList.remove('show');
    document.getElementById('formColeta').reset();
    removerSelecao();
    document.querySelectorAll('.material-card').forEach(c => c.classList.remove('selected'));
    materialSelecionado = null;
    document.getElementById('pontosVal').textContent = '0';
  }

  async function init() {
    const me = await apiFetch('/api/me').catch(() => ({ logado: false }));
    if (!me.logado || me.tipo !== 'setor') { window.location.href = '/login.html'; return; }

    const hoje = new Date();
    const diaAtual = hoje.getDay();

    document.getElementById('dataHoje').textContent = hoje.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('headerDesc').textContent = `Ponto de Coleta: ${me.nome}`;

    if (diaAtual !== me.dia_semana) {
      const DIAS = ['', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira'];
      document.getElementById('statusDia').innerHTML = `<div class="badge badge-red">🔒 Coleta indisponível hoje</div>`;
      showAlert(`Registro permitido apenas na ${DIAS[me.dia_semana]}. Hoje não é o dia de coleta do seu setor.`, 'warning');
      document.getElementById('btnRegistrar').disabled = true;
      document.getElementById('btnRegistrar').style.opacity = '0.5';
    } else {
      document.getElementById('statusDia').innerHTML = `<div class="badge badge-green">✅ Coleta liberada</div>`;
    }

    // Carregar lista de funcionários da empresa
    try {
      todosFuncionarios = await apiFetch('/api/admin/funcionarios/list');
    } catch (e) {
      console.error("Erro ao carregar funcionários", e);
    }
  }

  async function logout() {
    await apiFetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  // Fechar resultados ao clicar fora
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) {
      listaResultados.classList.remove('active');
    }
  });

  init();
</script>
</body>
</html>
