<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Coleta — EcoScore</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .pontos-preview {
      background: linear-gradient(135deg, var(--dark-3), var(--green-900));
      border: 1px solid var(--green-700);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }
    .pontos-value { font-size: 3rem; font-weight: 900; color: var(--gold); line-height: 1; }
    .pontos-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.4rem; }
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
    .success-icon-anim { font-size: 5rem; animation: bounceIn 0.5s ease; }
    @keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .form-wrap { max-width: 560px; margin: 0 auto; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <span class="logo-icon">🌿</span>
    <div>
      <span class="logo-text">EcoScore</span>
      <span class="logo-sub">Gestão Sustentável de Resíduos</span>
    </div>
  </a>
  <ul class="navbar-nav">
    <li><a href="dashboard.html">Painel</a></li>
    <li><a href="registro.html" class="active">Registrar</a></li>
    <li><a href="ranking.html">Ranking</a></li>
    <li><a href="recompensas.html">Recompensas</a></li>
  </ul>
  <div class="navbar-actions">
    <button onclick="logout()" class="btn btn-secondary btn-sm">Sair</button>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div>
      <h1 class="page-title">📝 Registrar Coleta</h1>
      <p class="page-desc" id="headerDesc">Informe os dados do material reciclado</p>
    </div>
    <div id="statusDia"></div>
  </div>
</div>

<!-- Overlay de Sucesso -->
<div class="success-overlay" id="successOverlay">
  <div>
    <div class="success-icon-anim">✅</div>
    <h2 style="font-size:1.8rem;font-weight:900;margin:1rem 0 0.5rem">Coleta Registrada!</h2>
    <p id="successMsg" style="color:var(--text-muted);font-size:1rem;margin-bottom:2rem"></p>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center">
      <button onclick="novaColeta()" class="btn btn-primary btn-lg">+ Nova Coleta</button>
      <a href="dashboard.html" class="btn btn-secondary btn-lg">Ver Painel</a>
    </div>
  </div>
</div>

<main class="section">
  <div class="container">
    <div class="form-wrap">

      <div id="alertBox" style="display:none;margin-bottom:1rem"></div>

      <!-- Preview de pontos -->
      <div class="pontos-preview" id="pontosPreview">
        <div class="pontos-value" id="pontosVal">0</div>
        <div class="pontos-label">pontos a ganhar neste registro</div>
      </div>

      <div class="card">
        <form id="formColeta" onsubmit="registrar(event)">

          <div class="form-group">
            <label class="form-label" for="funcionarioNome">👤 Nome do Funcionário</label>
            <input id="funcionarioNome" class="form-control" type="text" placeholder="Seu nome completo" required autocomplete="name" list="funcionariosList">
            <datalist id="funcionariosList"></datalist>
          </div>

          <div class="form-group">
            <label class="form-label">♻️ Tipo de Material</label>
            <div class="material-grid">
              <label class="material-card" id="card-metal" onclick="selectMaterial('metal')">
                <input type="radio" name="material" value="metal">
                <span class="material-emoji">🔩</span>
                <div class="material-name">Metal</div>
                <div class="material-pts">10 pts/kg</div>
              </label>
              <label class="material-card" id="card-vidro" onclick="selectMaterial('vidro')">
                <input type="radio" name="material" value="vidro">
                <span class="material-emoji">🪟</span>
                <div class="material-name">Vidro</div>
                <div class="material-pts">7 pts/kg</div>
              </label>
              <label class="material-card" id="card-plastico" onclick="selectMaterial('plastico')">
                <input type="radio" name="material" value="plastico">
                <span class="material-emoji">🧴</span>
                <div class="material-name">Plástico</div>
                <div class="material-pts">5 pts/kg</div>
              </label>
              <label class="material-card" id="card-papel" onclick="selectMaterial('papel')">
                <input type="radio" name="material" value="papel">
                <span class="material-emoji">📄</span>
                <div class="material-name">Papel</div>
                <div class="material-pts">3 pts/kg</div>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="pesoKg">⚖️ Peso (kg)</label>
            <input id="pesoKg" class="form-control" type="number" step="0.1" min="0.1" max="999" placeholder="Ex: 2.5" required oninput="atualizarPreview()">
          </div>

          <div style="background:var(--dark-2);border-radius:var(--radius);padding:1rem;margin-bottom:1.5rem;font-size:0.83rem;color:var(--text-dim)">
            🗓️ Data registrada automaticamente: <strong id="dataHoje" style="color:var(--text-muted)"></strong>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="btnRegistrar">✅ Registrar Coleta</button>
        </form>
      </div>
    </div>
  </div>
</main>

<script src="/js/config.js"></script>
<script>
  const PONTOS = { metal: 10, vidro: 7, plastico: 5, papel: 3 };
  let materialSelecionado = null;

  function selectMaterial(material) {
    document.querySelectorAll('.material-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('card-' + material).classList.add('selected');
    materialSelecionado = material;
    atualizarPreview();
  }

  function atualizarPreview() {
    const peso = parseFloat(document.getElementById('pesoKg').value) || 0;
    const pts = materialSelecionado ? Math.round(peso * PONTOS[materialSelecionado]) : 0;
    document.getElementById('pontosVal').textContent = pts.toLocaleString();
  }

  function showAlert(msg, tipo = 'error') {
    const box = document.getElementById('alertBox');
    const cls = { error: 'alert-error', warning: 'alert-warning', success: 'alert-success', info: 'alert-info' };
    const icon = { error: '❌', warning: '⚠️', success: '✅', info: 'ℹ️' };
    box.innerHTML = `<div class="alert ${cls[tipo]}">${icon[tipo]} ${msg}</div>`;
    box.style.display = '';
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function registrar(e) {
    e.preventDefault();

    const funcionario_nome = document.getElementById('funcionarioNome').value.trim();
    const peso_kg = document.getElementById('pesoKg').value;

    if (!materialSelecionado) { showAlert('Selecione o tipo de material.', 'warning'); return; }
    if (!funcionario_nome) { showAlert('Informe o nome do funcionário.', 'warning'); return; }

    const btn = document.getElementById('btnRegistrar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Registrando...';
    document.getElementById('alertBox').style.display = 'none';

    try {
      const data = await apiFetch('/api/coletas', {
        method: 'POST',
        body: { funcionario_nome, tipo_material: materialSelecionado, peso_kg }
      });
      document.getElementById('successMsg').textContent = `+${data.pontos} pontos conquistados! Continue assim!`;
      document.getElementById('successOverlay').classList.add('show');
    } catch (err) {
      if (err.status === 409) {
        showAlert('⚠️ ' + err.message, 'warning');
      } else {
        showAlert(err.message || 'Erro ao registrar coleta.', 'error');
      }
    }

    btn.disabled = false;
    btn.innerHTML = '✅ Registrar Coleta';
  }

  function novaColeta() {
    document.getElementById('successOverlay').classList.remove('show');
    document.getElementById('formColeta').reset();
    document.querySelectorAll('.material-card').forEach(c => c.classList.remove('selected'));
    materialSelecionado = null;
    document.getElementById('pontosVal').textContent = '0';
    document.getElementById('funcionarioNome').focus();
  }

  async function init() {
    const me = await apiFetch('/api/me').catch(() => ({ logado: false }));
    if (!me.logado || me.tipo !== 'setor') { window.location.href = '/login.html'; return; }

    const hoje = new Date();
    const diaAtual = hoje.getDay();
    const setor = me.setor;

    document.getElementById('dataHoje').textContent = hoje.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('headerDesc').textContent = `Setor: ${setor.nome}`;

    if (diaAtual !== setor.dia_semana) {
      const DIAS = ['', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira'];
      document.getElementById('statusDia').innerHTML = `<div class="badge badge-red">🔒 Coleta indisponível hoje</div>`;
      showAlert(`Registro permitido apenas na ${DIAS[setor.dia_semana]}. Hoje não é o dia de coleta do seu setor.`, 'warning');
      document.getElementById('btnRegistrar').disabled = true;
      document.getElementById('btnRegistrar').style.opacity = '0.5';
    } else {
      document.getElementById('statusDia').innerHTML = `<div class="badge badge-green">✅ Coleta liberada</div>`;
    }

    // Carregar sugestões de funcionários via ranking (nomes conhecidos)
    try {
      const ranking = await apiFetch('/api/ranking/funcionarios');
      const dl = document.getElementById('funcionariosList');
      ranking.filter(f => f.setor_nome === setor.nome).forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.funcionario_nome;
        dl.appendChild(opt);
      });
    } catch {}
  }

  async function logout() {
    await apiFetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  init();
</script>
</body>
</html>
