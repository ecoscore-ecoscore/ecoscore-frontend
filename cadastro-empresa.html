<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Empresa — EcoScore</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/config.js"></script>
  <style>
    body { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 2rem 1rem; 
      background: radial-gradient(ellipse at 70% 30%, rgba(76,175,80,0.12) 0%, transparent 60%), var(--dark); 
    }
    .register-box { width: 100%; max-width: 480px; animation: slideUp 0.4s ease; }
    .register-logo { text-align: center; margin-bottom: 2rem; }
    .register-logo .emoji { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
    .register-logo h1 { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--green-400), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body>

<div class="register-box">
  <div class="register-logo">
    <span class="emoji">🚀</span>
    <h1>EcoScore</h1>
    <p class="text-muted">Cadastre sua empresa e comece a reciclar</p>
  </div>

  <div class="card card-glass">
    <div id="msg" style="display:none;margin-bottom:1.5rem"></div>

    <form id="formCadastro">
      <div class="form-group">
        <label class="form-label" for="nome">Nome da Empresa</label>
        <input type="text" id="nome" name="nome" class="form-control" placeholder="Ex: Sustenta Corp" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">E-mail Corporativo (Admin)</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="contato@empresa.com" required>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" for="senha">Senha Admin</label>
          <input type="password" id="senha" name="senha" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmar_senha">Confirmar</label>
          <input type="password" id="confirmar_senha" name="confirmar_senha" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2" id="btnSubmit">
        <span>✅ Criar Conta Grátis</span>
      </button>
    </form>

    <div class="text-center mt-3">
      <p class="text-muted" style="font-size:0.85rem">
        Já tem uma conta? <a href="login.html" class="text-green fw-bold">Faça login</a>
      </p>
    </div>
  </div>

  <a href="/" class="btn btn-secondary btn-full mt-3">← Voltar à Página Inicial</a>
</div>

<script>
  const form = document.getElementById('formCadastro');
  const msgBox = document.getElementById('msg');
  const btn = document.getElementById('btnSubmit');

  form.onsubmit = async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(form));

    if (data.senha !== data.confirmar_senha) {
      showMsg('As senhas não coincidem', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Criando conta...';
    msgBox.style.display = 'none';

    try {
      await apiFetch('/api/auth/register-company', {
        method: 'POST',
        body: data
      });

      showMsg('Empresa cadastrada com sucesso! Redirecionando...', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } catch (err) {
      showMsg(err.message || 'Erro ao cadastrar empresa', 'error');
      btn.disabled = false;
      btn.innerHTML = '<span>✅ Criar Conta Grátis</span>';
    }
  };

  function showMsg(text, type) {
    const cls = type === 'error' ? 'alert-error' : 'alert-success';
    const icon = type === 'error' ? '❌' : '✅';
    msgBox.innerHTML = `<div class="alert ${cls}">${icon} ${text}</div>`;
    msgBox.style.display = 'block';
  }
</script>

</body>
</html>
