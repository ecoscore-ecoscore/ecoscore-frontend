<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Master — EcoScore</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .modal-overlay { display: none; }
    .modal-overlay.open { display: flex; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <span class="logo-icon">🌿</span>
    <div>
      <span class="logo-text">EcoScore Master</span>
      <span class="logo-sub">Gestão Global do Sistema</span>
    </div>
  </a>
  <div class="navbar-actions">
    <button onclick="abrirModalAlterarSenha()" class="btn btn-secondary btn-sm">🔒 Alterar Minha Senha</button>
    <button onclick="logout()" class="btn btn-secondary btn-sm">Sair</button>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div>
      <h1 class="page-title">🏢 Gestão de Empresas</h1>
      <p class="page-desc" id="headerStats">Carregando estatísticas...</p>
    </div>
    <button onclick="abrirModalEmpresa()" class="btn btn-primary">+ Nova Empresa</button>
  </div>
</div>

<main class="section">
  <div class="container">
    <div id="alertSuper" style="display:none;margin-bottom:1rem"></div>

    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome da Empresa</th>
              <th>E-mail Principal</th>
              <th>Setores / Funcionários</th>
              <th>Cadastro</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyEmpresas">
            <tr><td colspan="6" class="text-center text-dim" style="padding:3rem"><span class="spinner"></span> Carregando empresas...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Modal Empresa -->
<div class="modal-overlay" id="modalEmpresa">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">🚀 Cadastrar Nova Empresa</h3>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <form onsubmit="salvarEmpresa(event)">
      <div class="form-group">
        <label class="form-label">Nome da Empresa</label>
        <input id="empNome" class="form-control" required placeholder="Ex: Eco Global S.A.">
      </div>
      <div class="form-group">
        <label class="form-label">E-mail de Acesso (Admin)</label>
        <input id="empEmail" class="form-control" type="email" required placeholder="admin@empresa.com">
      </div>
      <div class="form-group">
        <label class="form-label">Senha Inicial</label>
        <input id="empSenha" class="form-control" type="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="btnSalvar">💾 Salvar Empresa</button>
    </form>
  </div>
</div>

<!-- Modal Alterar Senha -->
<div id="modalAlterarSenha" class="modal-overlay">
  <div class="modal" style="max-width: 400px;">
    <div class="modal-header">
      <h3 class="modal-title">🔒 Alterar Senha Master</h3>
      <button class="modal-close" onclick="fecharModalAlterarSenha()">✕</button>
    </div>
    <form id="formAlterarSenha" onsubmit="handleAlterarSenha(event)" style="padding: 1.5rem;">
      <div class="form-group">
        <label class="form-label">Senha Atual</label>
        <input type="password" id="senhaAtual" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Nova Senha</label>
        <input type="password" id="novaSenha" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar Nova Senha</label>
        <input type="password" id="confirmarSenha" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">✅ Atualizar Senha Master</button>
    </form>
  </div>
</div>

<script src="/js/config.js"></script>
<script>
  let empresasList = [];

  async function carregarEmpresas() {
    try {
      empresasList = await apiFetch('/api/super/empresas');
      
      document.getElementById('headerStats').textContent = `Total de ${empresasList.length} empresas cadastradas no ecossistema.`;
      
      const tbody = document.getElementById('tbodyEmpresas');
      if (empresasList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-dim" style="padding:3rem">Nenhuma empresa encontrada.</td></tr>';
        return;
      }

      tbody.innerHTML = empresasList.map(e => `
        <tr>
          <td style="color:var(--text-dim)">#${e.id}</td>
          <td style="font-weight:700">${e.nome}</td>
          <td>${e.email}</td>
          <td>
            <span class="badge badge-green">${e.total_setores} setores</span>
            <span class="badge badge-blue">${e.total_funcionarios} funcionários</span>
          </td>
          <td style="font-size:0.8rem;color:var(--text-dim)">${new Date(e.data_cadastro).toLocaleDateString()}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deletarEmpresa('${e.id}')">🗑️</button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      console.error("Erro ao carregar empresas:", err);
      // window.location.href = '/login.html';
    }
  }

  function abrirModalEmpresa() { document.getElementById('modalEmpresa').classList.add('open'); }
  function fecharModal() { document.getElementById('modalEmpresa').classList.remove('open'); }

  async function salvarEmpresa(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSalvar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Salvando...';

    const body = {
      nome: document.getElementById('empNome').value,
      email: document.getElementById('empEmail').value,
      senha: document.getElementById('empSenha').value
    };

    try {
      await apiFetch('/api/super/empresas', {
        method: 'POST',
        body
      });
      fecharModal();
      carregarEmpresas();
      showAlert('✅ Empresa cadastrada com sucesso!');
      document.getElementById('empNome').value = '';
      document.getElementById('empEmail').value = '';
      document.getElementById('empSenha').value = '';
    } catch (err) {
      showAlert('❌ ' + err.message, 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '💾 Salvar Empresa';
  }

  async function deletarEmpresa(id) {
    if (!confirm('Deseja REALMENTE excluir esta empresa e TODOS os seus dados? Esta ação não pode ser desfeita.')) return;
    try {
      await apiFetch(`/api/super/empresas/${id}`, { method: 'DELETE' });
      carregarEmpresas();
      showAlert('✅ Empresa removida do sistema.');
    } catch (err) {
      showAlert('❌ ' + err.message, 'error');
    }
  }

  function showAlert(msg, tipo = 'success') {
    const box = document.getElementById('alertSuper');
    const cls = tipo === 'success' ? 'alert-success' : 'alert-error';
    box.innerHTML = `<div class="alert ${cls}">${msg}</div>`;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 4000);
  }

  function abrirModalAlterarSenha() { document.getElementById('modalAlterarSenha').classList.add('open'); }
  function fecharModalAlterarSenha() { document.getElementById('modalAlterarSenha').classList.remove('open'); }

  async function handleAlterarSenha(e) {
    e.preventDefault();
    const body = {
      senhaAtual: document.getElementById('senhaAtual').value,
      novaSenha: document.getElementById('novaSenha').value,
      confirmarSenha: document.getElementById('confirmarSenha').value
    };
    try {
      await apiFetch('/api/auth/alterar-senha', { method: 'POST', body });
      showAlert('✅ Senha Master alterada com sucesso!');
      fecharModalAlterarSenha();
      document.getElementById('formAlterarSenha').reset();
    } catch (err) {
      alert('❌ ' + err.message);
    }
  }

  async function logout() {
    await apiFetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', (e) => { if(e.target === m) m.classList.remove('open'); });
  });

  carregarEmpresas();
</script>
</body>
</html>
